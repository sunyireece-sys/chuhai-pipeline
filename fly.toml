app = "chuhai-webui"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
PYTHONUNBUFFERED = "1"

[[mounts]]
source = "feedback_data"
destination = "/data"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/healthz"
