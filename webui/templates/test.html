<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>测试发送</title>
<link rel="stylesheet" href="/static/style.css?v=3">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="/static/translate.js"></script>
</head>
<body>
<header>
  <h1>测试发送</h1>
  <div class="meta">
    共 {{ rows|length }} 家测试公司
    {% if current_user_display %} · 欢迎，<strong>{{ current_user_display }}</strong>{% endif %}
    · <a href="/" class="btn-secondary">返回主页</a>
    · <a href="/inbox" class="btn-secondary">收件箱</a>
  </div>
</header>

<main>
  <div class="test-banner">测试模式 — 数据不计入正式统计，发送为 live 模式</div>

  {% if current_user_is_admin %}
    <form
      class="delete-test-form"
      method="post"
      action="/test/delete"
      onsubmit="return confirm('确认删除全部测试发送、回复和状态记录？runs/test_* 文件不会删除。')"
    >
      <label>删除确认
        <input type="text" name="confirm_text" placeholder="输入：删除测试数据">
      </label>
      <button type="submit" class="btn-exclude">删除全部测试数据</button>
    </form>
  {% endif %}

  <table class="leads">
    <thead>
      <tr>
        <th>#</th>
        <th>公司</th>
        <th>国家</th>
        <th>客户类型</th>
        <th>邮箱</th>
        <th>邮件主题</th>
        <th>状态</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
        {% include "_row.html" with context %}
      {% endfor %}
    </tbody>
  </table>
</main>
</body>
</html>
