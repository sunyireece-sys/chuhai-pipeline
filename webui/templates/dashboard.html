<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Dashboard - Sales Feedback</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>Dashboard</h1>
  <div class="meta">
    {{ scope_label }} · 欢迎，<strong>{{ current_user_display }}</strong> · <a href="/">返回首页</a>
    {% if current_user_is_admin %}
      · <a href="/admin">Admin</a>
      {% if showing_all %}
        · <a href="/dashboard">只看自己</a>
      {% else %}
        · <a href="/dashboard?user=all">全部人员</a>
      {% endif %}
    {% endif %}
  </div>
</header>

<main>
  {% include "_dashboard_panel.html" with context %}
</main>
</body>
</html>
