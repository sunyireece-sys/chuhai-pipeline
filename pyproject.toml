[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".venv",
  ".devcontainer",
  "runs",
  "backups",
  "redvia-site/assets",
  "工作日志",
  "会议",
]

[tool.ruff.lint]
# Start permissive: pyflakes (F) + pycodestyle errors (E) + import sort (I)
# Do NOT enable B/UP/N yet — existing code will explode.
select = ["E", "F", "I"]
ignore = [
  "E501",  # line length: we'll tighten later
]

[tool.ruff.lint.per-file-ignores]
# Known violations in core files; clean up in a dedicated PR (plan task 2).
# Keeping these here so CI stays green while we onboard collaborators.
"profile_enrich.py" = ["F841"]      # unused partner_label, intentional placeholder
"webui/app.py" = ["E741"]            # single-letter `l` in list comprehensions
"webui/test_lead_priority.py" = ["E402"]  # imports after env-var bootstrap (intentional)

[tool.pytest.ini_options]
testpaths = ["webui", "tests"]
python_files = ["test_*.py"]
pythonpath = ["."]
addopts = "-q --ignore=webui/.venv"
