name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Pytest (webui)
        run: pytest webui/ -q

  worker-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json

      - name: Install Worker deps
        run: npm ci

      - name: Wrangler dry-run (esbuild bundle check)
        run: npx wrangler deploy --dry-run --outdir=/tmp/worker-bundle
        env:
          # wrangler needs a token shape to dry-run, but won't actually call CF API
          CLOUDFLARE_API_TOKEN: dryrun-no-network
