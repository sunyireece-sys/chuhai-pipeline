name = "redvia-tracking"
main = "src/worker.mjs"
compatibility_date = "2026-05-20"
workers_dev = true

[assets]
directory = "../redvia-site"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "redvia_tracking"
database_id = "090495dd-fd9e-4fed-9901-29a6bdb3e563"
migrations_dir = "migrations"

[vars]
SITE_URL = "https://redvia-bry.com"
COOKIE_DOMAIN = ".redvia-bry.com"
COOKIE_MAX_AGE = "7776000"
TOKEN_TTL_DAYS = "14"
EVENT_SYNC_LIMIT = "500"
ALLOWED_ORIGINS = "https://redvia-bry.com,https://www.redvia-bry.com,https://redvia-tracking.redvia.workers.dev"
# Optional while the static site is still served by this Worker and webUI lives elsewhere.
# Set to the sales webUI origin.
MATCH_API_BASE_URL = "https://sales.redvia-bry.com"

[triggers]
crons = ["* * * * *"]
